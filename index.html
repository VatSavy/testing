<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Branch Test</title>

    <style>
        body{
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card{
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            width: 300px;
        }

        h1{
            color: #ff4f81;
        }

        p{
            color: #555;
        }

        button{
            background: #ff4f81;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background: #e63e70;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello GitHub 🚀</h1>
        <p>This is my testing project for Git branch.</p>

        <button onclick="showMessage()">
            Click Me
        </button>
    </div>

    <script>
        function showMessage(){
            alert("Git Branch Working Successfully!");
        }
    </script>

</body>
</html>
